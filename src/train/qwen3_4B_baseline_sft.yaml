### arguments: https://llamafactory.readthedocs.io/en/latest/advanced/arguments.html
#
# Baseline SFT: Qwen3-4B-Instruct on JSONSchemaBench 2.5k
# 목적: GRPO/DPO 실험 대비 baseline
#
# 사전 준비:
#   1. python src/prepare_jsonschemabench_sft.py
#   2. cp data/sft/jsonschemabench_sft_baseline.jsonl /LLaMA-Factory/data/
#   3. /LLaMA-Factory/data/dataset_info.json 에 jsonschemabench_sft_baseline 등록
#      (prepare_jsonschemabench_sft.py 실행 후 출력된 JSON 참고)

### model
model_name_or_path: Qwen/Qwen3-4B-Instruct-2507
trust_remote_code: true

### method
stage: sft
do_train: true
disable_shuffling: false
finetuning_type: lora
lora_rank: 64
lora_alpha: 128
lora_target: all

### dataset
dataset_dir: /LLaMA-Factory/data
dataset: jsonschemabench_sft_baseline
template: qwen3_nothink
cutoff_len: 2048
max_samples: 2500
preprocessing_num_workers: 16
dataloader_num_workers: 4

### output
output_dir: saves/qwen3-4b/full/baseline_sft
logging_steps: 1
save_steps: 200
plot_loss: true
overwrite_output_dir: true
save_only_model: true
report_to: wandb

### train
per_device_train_batch_size: 8
gradient_accumulation_steps: 1  # effective batch = 2 GPUs x 8 x 1 = 16
learning_rate: 2.0e-5
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null
optim: adamw_torch_fused

### acceleration
flash_attn: fa2
enable_liger_kernel: true
disable_gradient_checkpointing: false

### eval
val_size: 0.1