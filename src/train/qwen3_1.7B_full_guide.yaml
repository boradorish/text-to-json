### arguments: https://llamafactory.readthedocs.io/en/latest/advanced/arguments.html

### model
model_name_or_path: Qwen/Qwen3-1.7B
trust_remote_code: true

### method
stage: sft
do_train: true
disable_shuffling: false
finetuning_type: full
deepspeed: /LLaMA-Factory/examples/deepspeed/ds_z0_config.json # 1.7B는 z0으로 충분

### dataset
dataset_dir: /LLaMA-Factory/data
dataset: sunny_reasoning
template: qwen3
cutoff_len: 16384
max_samples: 20000
preprocessing_num_workers: 16
dataloader_num_workers: 4

### output
output_dir: saves/qwen3-1.7b/full/sft
logging_steps: 1
save_steps: 500
plot_loss: true
overwrite_output_dir: true
save_only_model: true  # optimizer state 저장 스킵 (디스크 절약)
report_to: wandb

### train
per_device_train_batch_size: 2
gradient_accumulation_steps: 4 # effective batch = 2 x GPU수 x 4
learning_rate: 4.0e-5
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null
optim: adamw_torch_fused

### acceleration
flash_attn: fa2
enable_liger_kernel: true
disable_gradient_checkpointing: true

### eval
val_size: 0.05
