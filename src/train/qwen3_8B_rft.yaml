### arguments: https://llamafactory.readthedocs.io/en/latest/advanced/arguments.html
#
# Rejection Sampling Fine-Tuning (RFT) 학습 설정
#
# 사전 준비:
#   1. python src/generate_rft_data.py --model <현재SFT모델경로> --num-samples 4
#   2. 생성된 data/rft/sunny_rft.jsonl 을 /LLaMA-Factory/data/ 에 복사
#   3. /LLaMA-Factory/data/dataset_info.json 에 아래 항목 추가:
#      "sunny_rft": {
#        "file_name": "sunny_rft.jsonl",
#        "formatting": "sharegpt",
#        "columns": {"messages": "conversations"}
#      }

### model
model_name_or_path: Qwen/Qwen3-8B
trust_remote_code: true

### method
stage: sft
do_train: true
disable_shuffling: false
finetuning_type: full
deepspeed: /LLaMA-Factory/examples/deepspeed/ds_z3_config.json

### dataset
dataset_dir: /LLaMA-Factory/data
dataset: sunny_rft           # generate_rft_data.py 로 생성한 데이터셋
template: qwen3
cutoff_len: 4096
preprocessing_num_workers: 16
dataloader_num_workers: 4

### output
output_dir: saves/qwen3-8b/full/rft
logging_steps: 1
save_steps: 500
plot_loss: true
overwrite_output_dir: true
save_only_model: true
report_to: wandb

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 4
learning_rate: 5.0e-6          # RFT는 SFT보다 낮은 lr 권장 (이미 학습된 모델 위에 추가 학습)
num_train_epochs: 2.0
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null
optim: adamw_torch_fused

### acceleration
flash_attn: fa2
enable_liger_kernel: true
disable_gradient_checkpointing: false

### eval
val_size: 0.05
