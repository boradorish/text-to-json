### arguments: https://llamafactory.readthedocs.io/en/latest/advanced/arguments.html

### model
model_name_or_path: Qwen/Qwen3-4B-Instruct-2507
trust_remote_code: true

### method
stage: sft
do_train: true
disable_shuffling: false
finetuning_type: full
deepspeed: /LLaMA-Factory/examples/deepspeed/ds_z3_config.json # 공용 서버의 LLaMA-Factory 경로

### dataset
dataset_dir: data # 현재 레포 루트 기준
dataset: sunny_reasoning
template: qwen3
cutoff_len: 4096
max_samples: 20000
preprocessing_num_workers: 16
dataloader_num_workers: 4

### output
output_dir: ./saves/qwen3-4b/full/sft # 현재 레포 루트 기준
logging_steps: 1
save_steps: 500
plot_loss: true
overwrite_output_dir: true
save_only_model: true # optimizer state 저장 스킵 (디스크 절약)
report_to: wandb

### train
per_device_train_batch_size: 2
gradient_accumulation_steps: 4 # effective batch = 1 x 2 x 4 = 8
learning_rate: 2.0e-5
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null
optim: adamw_torch_fused

### acceleration
flash_attn: fa2
enable_liger_kernel: true
disable_gradient_checkpointing: false

### eval
val_size: 0.1
