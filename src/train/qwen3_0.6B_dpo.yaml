### arguments: https://llamafactory.readthedocs.io/en/latest/advanced/arguments.html
#
# Qwen3-0.6B DPO 학습 설정
#
# 사전 준비:
#   1. data/sunny_dpo.jsonl 생성
#   2. data/dataset_info.json 에 sunny_dpo 등록

### model
model_name_or_path: boradorish/qwen3-0.6b
trust_remote_code: true

### method
stage: dpo
do_train: true
finetuning_type: full
pref_beta: 0.1
pref_loss: sigmoid

### dataset
dataset_dir: data
dataset: sunny_dpo
template: qwen3
cutoff_len: 2048
preprocessing_num_workers: 16
dataloader_num_workers: 4

### output
output_dir: saves/qwen3-0.6b/full/dpo
logging_steps: 1
save_steps: 500
plot_loss: true
overwrite_output_dir: true
save_only_model: true
report_to: wandb

### train
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 5.0e-7
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null
optim: adamw_torch_fused

### acceleration
flash_attn: fa2
enable_liger_kernel: false
disable_gradient_checkpointing: false

### eval
val_size: 0.05
