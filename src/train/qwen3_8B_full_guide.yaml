### arguments: https://llamafactory.readthedocs.io/en/latest/advanced/arguments.html

### model
model_name_or_path: Qwen/Qwen3-8B
trust_remote_code: true

### method
stage: sft
do_train: true
disable_shuffling: false
finetuning_type: full
deepspeed: /LLaMA-Factory/examples/deepspeed/ds_z3_config.json

### dataset
dataset_dir: /LLaMA-Factory/data
dataset: sunny_reasoning
template: qwen3
cutoff_len: 4096
max_samples: 20000
preprocessing_num_workers: 16
dataloader_num_workers: 4

### output
output_dir: saves/qwen3-8b/full/sft
logging_steps: 1
save_steps: 500
plot_loss: true
overwrite_output_dir: true
save_only_model: true  # optimizer state 저장 스킵 (디스크 절약)
report_to: wandb

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 4 # effective batch = 1 x 2 x 4 = 8
learning_rate: 2.0e-5
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null
optim: adamw_torch_fused

### acceleration
flash_attn: fa2
enable_liger_kernel: true
disable_gradient_checkpointing: false

### eval
val_size: 0.05
